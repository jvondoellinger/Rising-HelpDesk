server.port=8001
spring.application.name=rising_helpdesk

spring.data.redis.host=172.17.0.4
spring.data.redis.port=6379

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=jdbc:mysql://localhost:3306/RisingHelpDeskDB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

management.metrics.tags.application=rising_helpdesk
management.endpoint.health.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=info,metrics,prometheus,health
management.endpoint.metrics.cache.time-to-live=100ms

logging.level.org.mariadb.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
