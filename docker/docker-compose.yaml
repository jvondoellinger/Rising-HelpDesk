version: '3.8'

services:
    proxysql:
        image: proxysql/proxysql
        container_name: proxysql
        ports:
          - "6032:6032"
          - "6033:6033"
        networks:
            - databases_networks


    mysql-master:
        image: mysql:8
        container_name: mysql_master
        ports:
            - "3306:3306"
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        command:
            [
            "--server-id=1",
            "--log-bin=mysql-bin",
            "--binlog-format=ROW"
            ]
        networks:
            - databases_networks

    mysql-repl-1:
        image: mysql:8
        container_name: mysql_repl_1
        ports:
            - "3307:3306"
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        command:
            - "--server-id=2"
            - "--relay-log=relay-bin"
            - "--read-only=ON"
        networks:
            - databases_networks

    mysql-repl-2:
        image: mysql:8
        container_name: mysql_repl_2
        ports:
            - "3308:3306"
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        command:
            - "--server-id=3"
            - "--relay-log=relay-bin"
            - "--read-only=ON"
        networks:
            - databases_networks

networks: 
    databases_networks:
        driver: bridge