
networks:
    rising_helpdesk:
        driver: bridge

volumes:
    prometheus_data:
    grafana_data:
services:
    prometheus:
        image: prom/prometheus:latest
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
            - prometheus_data:/prometheus
        networks:
            - rising_helpdesk
        ports:
            - 9090:9090
    grafana_service:
        image: grafana/grafana:latest
        volumes:
            - grafana_data:/grafana
        ports:
            - 3000:3000
        networks:
            - rising_helpdesk
