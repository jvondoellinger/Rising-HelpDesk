server.port=8001
spring.application.name=rising_helpdesk

spring.data.redis.host=redis
spring.data.redis.port=6379

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.datasource.url=jdbc:mysql://localhost:3306/RisingHelpDeskDB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always
management.endpoint.metrics.cache.time-to-live=100ms
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=rising_helpdesk

logging.level.org.mariadb.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
