server:
  port: 8001
spring:
  data:
    redis:
      host: redis
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  application:
    name: agp-protocol
  datasource:
    url:
    username:
    password:
logging:
  level:
    org.mariadb.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG