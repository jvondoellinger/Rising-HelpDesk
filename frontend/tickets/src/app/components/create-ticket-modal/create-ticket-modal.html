<div class="modal-overlay d-flex justify-content-center align-items-center p-3">

  <div class="modal-card bg-white shadow-lg rounded-4 w-100">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center px-4 py-3 border-bottom">

      <div>
        <h5 class="fw-bold mb-0">Criar Incidente</h5>
        <small class="text-muted">Descreva o problema com detalhes</small>
      </div>

      <button class="btn-close" (click)="close()"></button>
    </div>

    <!-- BODY -->
    <div class="px-4 py-4">

      <div class="mb-4">
        <label class="form-label fw-semibold">Título</label>
        <input type="text"
               class="form-control rounded-3"
               placeholder="Ex: Problema no login">
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Descrição</label>
        <textarea class="form-control rounded-3"
                  rows="6"
                  placeholder="Explique o que aconteceu..."></textarea>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="d-flex justify-content-between align-items-center px-4 py-3 border-top">

      <small class="text-muted">
        ESC para fechar
      </small>

      <div class="d-flex gap-2">

        <button class="btn btn-outline-secondary rounded-3 px-4"
                (click)="close()">
          Cancelar
        </button>

        <button class="btn btn-primary rounded-3 px-4 fw-semibold"
                (click)="create()">
          Criar incidente
        </button>

      </div>
    </div>

  </div>

</div>
